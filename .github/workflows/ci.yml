name: CI Build and Test

on:
  push:
    branches:
      - master
      - develop
    tags:
      - "v*" # tag 推送时同时触发 CI 验证
    paths-ignore:
      - '**.md'
      - 'images/**'
      - 'PREVIEW.md'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'images/**'
      - 'PREVIEW.md'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0'
  NODE_VERSION: '20'

jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore with cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.slnx') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore ReferenceRAG.slnx

      - name: Build
        run: dotnet build ReferenceRAG.slnx --no-restore --configuration Release

      - name: Run Tests
        run: dotnet test ReferenceRAG.slnx --no-build --configuration Release --verbosity normal

  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: dashboard-vue/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./dashboard-vue

      - name: Type check
        run: npm run type-check
        working-directory: ./dashboard-vue

      - name: Build
        run: npm run build
        working-directory: ./dashboard-vue
