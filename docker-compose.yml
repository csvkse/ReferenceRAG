services:
  reference-rag:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reference-rag
    image: reference-rag:latest
    ports:
      - "5123:5000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DataPath=/app/data
      - LogsPath=/app/logs
      - ReferenceRAG__Service__port=5000
      - ReferenceRAG__Service__host=0.0.0.0
      - SwaggerEnabled=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
